<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free IPTV - Apple Style</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.min.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #007aff; /* Apple's signature blue */
            --accent-color-hover: #0056b3;
            --text-color-primary: #1d1d1f; /* Near-black for primary text */
            --text-color-secondary: #6e6e73; /* Gray for secondary text */
            --background-panel: rgba(242, 242, 247, 0.7); /* Semi-transparent light gray */
            --background-panel-solid: #f2f2f7;
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.1);
            --border-radius-large: 20px;
            --border-radius-medium: 12px;
            --border-radius-small: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-attachment: fixed;
            color: var(--text-color-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 25px 0;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.8em;
            font-weight: 700;
            color: var(--text-color-primary);
            letter-spacing: -1px;
        }

        .content {
            display: flex;
            gap: 25px;
        }

        #channel-list, #player-container {
            background-color: var(--background-panel);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-large);
            box-shadow: 0 8px 32px 0 var(--shadow-color);
            transition: all 0.3s ease;
        }

        #channel-list {
            flex: 0 0 320px;
            height: calc(100vh - 180px);
            overflow-y: auto;
            padding: 15px;
        }

        #channel-list::-webkit-scrollbar {
            width: 6px;
        }
        #channel-list::-webkit-scrollbar-track {
            background: transparent;
        }
        #channel-list::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        #channel-list button {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 12px;
            border: none;
            background-color: transparent;
            color: var(--text-color-primary);
            text-align: left;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: var(--border-radius-medium);
            margin-bottom: 8px;
        }

        #channel-list button:hover {
            background-color: rgba(0, 0, 0, 0.05);
            transform: scale(1.02);
        }

        #channel-list button.active {
            background-color: var(--accent-color);
            color: white;
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
        }
        
        #channel-list button.active .channel-name {
            color: white;
        }
        #channel-list button.active .channel-description {
            color: rgba(255, 255, 255, 0.8);
        }

        .channel-item {
            display: flex;
            align-items: center;
            width: 100%; /* Ensure it fills the button */
            overflow: hidden; /* Prevent content from spilling out */
        }

        .channel-icon {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            object-fit: contain;
            border-radius: var(--border-radius-small);
            background-color: rgba(255, 255, 255, 0.5);
            padding: 4px;
            flex-shrink: 0;
        }

        .channel-info {
            overflow: hidden;
            flex-grow: 1;
        }

        .channel-name {
            font-weight: 500;
            font-size: 1em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-color-primary);
            transition: color 0.25s ease;
        }

        .channel-description {
            font-size: 0.85em;
            color: var(--text-color-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.25s ease;
        }

        #player-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #video-wrapper {
            width: 100%;
            position: relative;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
            border-radius: var(--border-radius-medium);
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .video-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #controls {
            display: none;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        #controls button {
            padding: 12px 25px;
            font-size: 1em;
            font-weight: 500;
            background-color: var(--background-panel-solid);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-medium);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #controls button:hover {
            background-color: #e9e9ed;
            transform: translateY(-2px);
        }

        #keyboard-info {
            text-align: center;
            margin-top: 25px;
            color: var(--text-color-secondary);
            font-size: 0.9em;
            background-color: rgba(255, 255, 255, 0.5);
            padding: 8px 15px;
            border-radius: var(--border-radius-medium);
            display: inline-block;
            left: 50%;
            position: relative;
            transform: translateX(-50%);
        }

        @media (max-width: 968px) {
            .content {
                flex-direction: column;
            }

            #channel-list {
                height: 35vh;
                flex: none;
            }

            #player-container {
                order: -1;
            }

            #controls {
                display: flex;
            }

            #keyboard-info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Free IPTV</h1>
    </header>
    <div class="container">
        <div class="content">
            <div id="channel-list"></div>
            <div id="player-container">
                <div id="video-wrapper">
                    <video-js id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{"techOrder": ["html5"]}'>
                        <p class="vjs-no-js">
                            To view this video please enable JavaScript, and consider upgrading to a web browser that
                            <a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 video</a>
                        </p>
                    </video-js>
                </div>
            </div>
        </div>
        <div id="controls">
            <button id="prev-channel">上一个频道</button>
            <button id="next-channel">下一个频道</button>
        </div>
        <div id="keyboard-info">
            使用键盘 ↑ ↓ 键切换频道
        </div>
    </div>

    <script>
        // JavaScript 代码已修正
        const playlistUrl = 'https://raw.githubusercontent.com/sdlkhfksl/tvn/refs/heads/main/tv.m3u';
        const channelList = document.getElementById('channel-list');
        const player = videojs('my-video', {
            html5: {
                hls: {
                    overrideNative: true
                }
            }
        });

        let currentChannelIndex = -1;
        let channels = [];

        function isValidIpv4Url(string) {
            try {
                const url = new URL(string);
                return !string.includes('[') && !string.includes(']');
            } catch (_) {
                return false;
            }
        }

        function parseM3ULine(line) {
            if (line.startsWith('http://') || line.startsWith('https://')) {
                return line.trim();
            }
            return null;
        }

        function extractTvgInfo(extinf) {
            const logoMatch = extinf.match(/tvg-logo="([^"]+)"/);
            const nameMatch = extinf.match(/tvg-name="([^"]+)"/);
            return {
                logo: logoMatch ? logoMatch[1] : null,
                name: nameMatch ? nameMatch[1] : null
            };
        }

        function playChannel(index) {
            if (index >= 0 && index < channels.length) {
                const channel = channels[index];
                player.src({
                    type: 'application/x-mpegURL',
                    src: channel.url
                });
                player.play();
                
                const currentActive = channelList.querySelector('button.active');
                if (currentActive) {
                    currentActive.classList.remove('active');
                }
                
                const newActiveButton = channelList.children[index];
                newActiveButton.classList.add('active');
                currentChannelIndex = index;
                
                newActiveButton.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        fetch(playlistUrl)
            .then(response => response.text())
            .then(data => {
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const tvgInfo = extractTvgInfo(lines[i]);
                        const title = lines[i].split(',')[1] || '';
                        const url = parseM3ULine(lines[i+1]);
                        
                        if (url && isValidIpv4Url(url)) {
                            channels.push({ title: title.trim(), url, tvgInfo });
                            
                            const button = document.createElement('button');
                            const channelItem = document.createElement('div');
                            channelItem.className = 'channel-item';

                            if (tvgInfo.logo) {
                                const img = document.createElement('img');
                                img.src = tvgInfo.logo;
                                img.className = 'channel-icon';
                                img.alt = tvgInfo.name || title.trim();
                                img.onerror = function() { this.style.display = 'none'; };
                                channelItem.appendChild(img);
                            }

                            const infoDiv = document.createElement('div');
                            infoDiv.className = 'channel-info';

                            const nameSpan = document.createElement('span');
                            nameSpan.className = 'channel-name';
                            nameSpan.textContent = tvgInfo.name || title.trim();
                            infoDiv.appendChild(nameSpan);

                            if (tvgInfo.name && tvgInfo.name.toLowerCase() !== title.trim().toLowerCase() && title.trim()) {
                                const descSpan = document.createElement('span');
                                descSpan.className = 'channel-description';
                                descSpan.textContent = title.trim();
                                infoDiv.appendChild(descSpan);
                            }

                            // ==================================================
                            //  这是关键的修复步骤
                            //  将包含文本的 infoDiv 添加到 channelItem 中
                            // ==================================================
                            channelItem.appendChild(infoDiv);

                            button.appendChild(channelItem);
                            channelList.appendChild(button);
                        }
                    }
                }
                if (channels.length > 0) {
                    playChannel(0);
                }
                
                channelList.querySelectorAll('button').forEach((button, index) => {
                    button.onclick = function() {
                        playChannel(index);
                    };
                });
            })
            .catch(error => console.error('Error fetching or parsing playlist:', error));

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                playChannel(Math.max(0, currentChannelIndex - 1));
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
            }
        });

        document.getElementById('prev-channel').addEventListener('click', function() {
            playChannel(Math.max(0, currentChannelIndex - 1));
        });

        document.getElementById('next-channel').addEventListener('click', function() {
            playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
        });

        let touchStartX = 0;
        let touchEndX = 0;
        const playerElement = document.getElementById('player-container');

        playerElement.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        playerElement.addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            if (Math.abs(touchStartX - touchEndX) < 50) return;

            if (touchEndX < touchStartX) {
                playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
            }
            if (touchEndX > touchStartX) {
                playChannel(Math.max(0, currentChannelIndex - 1));
            }
        }
    </script>
</body>
</html>
