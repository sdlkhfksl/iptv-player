<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free IPTV - Ultimate Edition</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.min.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #151a22;
            --bg-card: rgba(25, 30, 40, 0.8);
            --text-primary: #eef1f5;
            --text-secondary: #a0aebd;
            --accent: #4f86e7;
            --error-color: #e74c3c;
            --border-color: rgba(100, 120, 143, 0.3);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 8px;
            --shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 80% 20%, rgba(78, 132, 231, 0.15), transparent 70%),
                radial-gradient(circle at 20% 80%, rgba(126, 91, 239, 0.15), transparent 70%),
                linear-gradient(135deg, #0f1217, #151a22);
            z-index: -1;
        }
        
        .glass-container {
            display: flex;
            width: 100%;
            max-width: 1600px;
            height: 90vh;
            background: var(--bg-card);
            backdrop-filter: blur(16px) saturate(180%);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            overflow: hidden;
            position: relative;
        }
        
        .glass-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: var(--radius-lg);
            pointer-events: none;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        
        .channel-panel {
            width: 320px;
            height: 100%;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 20px 0;
        }
        
        .panel-header {
            padding: 0 20px 15px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
        }
        
        .panel-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
        }
        
        .panel-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .channel-search {
            padding: 0 20px 20px 20px;
        }
        
        .search-box {
            background: rgba(20, 25, 35, 0.5);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 10px;
            width: 100%;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: var(--transition);
        }
        
        .search-box:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 134, 231, 0.2);
        }
        
        .channel-header {
            padding: 10px 20px;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .channel-category {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            opacity: 0.7;
        }
        
        .channel-count {
            font-size: 0.8rem;
            color: var(--text-secondary);
            background: rgba(30, 35, 45, 0.5);
            padding: 3px 8px;
            border-radius: 20px;
        }
        
        .channel-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px;
        }
        
        .channel-scroll::-webkit-scrollbar {
            width: 8px;
        }
        
        .channel-scroll::-webkit-scrollbar-track {
            background: rgba(10, 15, 25, 0.3);
            border-radius: 4px;
        }
        
        .channel-scroll::-webkit-scrollbar-thumb {
            background: rgba(100, 120, 143, 0.6);
            border-radius: 4px;
        }
        
        .channel-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            margin: 0 10px 8px 10px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .channel-item:hover {
            background: rgba(50, 60, 80, 0.4);
        }
        
        .channel-item.active {
            background: rgba(79, 134, 231, 0.15);
            position: relative;
        }
        
        .channel-item.active::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 60%;
            width: 3px;
            background: var(--accent);
            border-radius: 0 3px 3px 0;
        }
        
        .channel-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(40, 45, 60, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
            color: var(--accent);
        }
        
        .channel-info {
            flex: 1;
            min-width: 0;
        }
        
        .channel-name {
            font-weight: 500;
            font-size: 1rem;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .channel-url {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .player-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }
        
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .player-title-container {
            min-width: 0;
        }
        
        .player-title {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .player-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .player-controls {
            display: flex;
            gap: 12px;
        }
        
        .control-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(30, 35, 45, 0.6);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-primary);
            transition: var(--transition);
        }
        
        .control-btn:hover {
            background: rgba(79, 134, 231, 0.2);
            border-color: var(--accent);
        }
        
        .player-wrapper {
            flex: 1;
            background-color: #000;
            border-radius: var(--radius-md);
            overflow: hidden;
            position: relative;
        }
        
        .video-js {
            width: 100%;
            height: 100%;
        }
        
        .video-js .vjs-big-play-button {
            border-radius: 50%;
            width: 65px;
            height: 65px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            font-size: 3em;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            line-height: 65px;
            transition: var(--transition);
        }
        
        .video-js .vjs-big-play-button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        #status-bar {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-sm);
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        #status-bar.error {
            color: var(--error-color);
        }
        
        #status-bar.error i {
            color: var(--error-color);
        }
        
        #status-bar i {
            color: var(--accent);
            transition: color 0.3s ease;
        }
        
        #loading-indicator {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(79, 134, 231, 0.3);
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 1100px) {
            .player-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .player-controls {
                align-self: flex-end;
            }
        }
        
        @media (max-width: 900px) {
            .glass-container {
                flex-direction: column;
                height: auto;
                min-height: 90vh;
            }
            
            .channel-panel {
                width: 100%;
                height: 40vh;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            
            .player-container {
                min-height: 50vh;
            }
        }
        
        @media (max-width: 600px) {
            .player-title {
                font-size: 1.1rem;
            }
            
            .panel-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="channel-panel">
            <div class="panel-header">
                <div class="panel-title"><i class="fas fa-satellite-dish" style="margin-right: 12px; color: var(--accent);"></i> IPTV频道列表</div>
                <div class="panel-subtitle">选择你想观看的电视频道</div>
            </div>
            <div class="channel-search">
                <input type="text" id="search-input" class="search-box" placeholder="搜索频道...">
            </div>
            <div class="channel-header">
                <div class="channel-category">可用频道</div>
                <div id="channel-count" class="channel-count">0个频道</div>
            </div>
            <div id="channel-scroll" class="channel-scroll">
                <div class="loading-text" style="text-align: center; padding: 40px; color: var(--text-secondary);">
                    <i class="fas fa-spinner fa-spin"></i> 加载电视频道中...
                </div>
            </div>
        </div>
        
        <div class="player-container">
            <div class="player-header">
                <div class="player-title-container">
                    <div id="player-title" class="player-title">准备播放...</div>
                    <div id="player-subtitle" class="player-subtitle"></div>
                </div>
                <div id="player-controls" class="player-controls">
                    <div class="control-btn" title="上一个频道" id="prev-channel">
                        <i class="fas fa-chevron-left"></i>
                    </div>
                    <div class="control-btn" title="下一个频道" id="next-channel">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
            <div class="player-wrapper">
                <video-js id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{}'></video-js>
                <div id="loading-indicator">
                    <div class="loading-spinner"></div>
                </div>
            </div>
            <div id="status-bar">
                <i class="fas fa-info-circle"></i>
                <span id="status-message">使用上下方向键或左右滑动切换频道</span>
            </div>
        </div>
    </div>

    <script>
        const playlistUrl = 'https://raw.githubusercontent.com/sdlkhfksl/tvn/refs/heads/main/tv.m3u';
        const channelScroll = document.getElementById('channel-scroll');
        const player = videojs('my-video', {
            html5: { hls: { overrideNative: true } }
        });
        
        const playerTitle = document.getElementById('player-title');
        const playerSubtitle = document.getElementById('player-subtitle');
        const channelCount = document.getElementById('channel-count');
        const prevBtn = document.getElementById('prev-channel');
        const nextBtn = document.getElementById('next-channel');
        const searchInput = document.getElementById('search-input');
        const loadingIndicator = document.getElementById('loading-indicator');
        const statusBar = document.getElementById('status-bar');
        const statusMessage = document.getElementById('status-message');
        
        let currentChannel = null;
        let allChannels = [];
        let filteredChannels = [];

        function isValidIpv4Url(string) {
            try { new URL(string); return true; } catch (_) { return false; }
        }

        function parseM3ULine(line) {
            return (line.startsWith('http://') || line.startsWith('https://')) ? line.trim() : null;
        }

        function extractTvgInfo(extinf) {
            const logoMatch = extinf.match(/tvg-logo="([^"]+)"/);
            const nameMatch = extinf.match(/tvg-name="([^"]+)"/);
            return {
                logo: logoMatch ? logoMatch[1] : null,
                name: nameMatch ? nameMatch[1] : null
            };
        }
        
        function createDefaultIcon() {
            const icon = document.createElement('div');
            icon.className = 'channel-icon';
            icon.innerHTML = '<i class="fas fa-tv"></i>';
            return icon;
        }

        function renderChannelList() {
            const searchTerm = searchInput.value.toLowerCase();
            filteredChannels = allChannels.filter(channel => 
                (channel.tvgInfo.name && channel.tvgInfo.name.toLowerCase().includes(searchTerm)) ||
                (channel.title && channel.title.toLowerCase().includes(searchTerm))
            );
            
            channelScroll.innerHTML = '';
            channelCount.textContent = `${filteredChannels.length}个频道`;
            
            filteredChannels.forEach(channel => {
                const channelElement = document.createElement('div');
                channelElement.className = 'channel-item';
                if (currentChannel && currentChannel.url === channel.url) {
                    channelElement.classList.add('active');
                }
                
                const channelIcon = channel.tvgInfo.logo ? document.createElement('img') : createDefaultIcon();
                if (channel.tvgInfo.logo) {
                    channelIcon.className = 'channel-icon';
                    channelIcon.src = channel.tvgInfo.logo;
                    channelIcon.onerror = function() {
                        this.replaceWith(createDefaultIcon());
                    };
                }
                
                const channelInfo = document.createElement('div');
                channelInfo.className = 'channel-info';
                
                const channelName = document.createElement('div');
                channelName.className = 'channel-name';
                channelName.textContent = channel.tvgInfo.name || channel.title;
                
                const channelUrl = document.createElement('div');
                channelUrl.className = 'channel-url';
                try {
                    const url = new URL(channel.url);
                    channelUrl.textContent = url.hostname;
                } catch (e) {
                    channelUrl.textContent = channel.url.slice(0, 40) + (channel.url.length > 40 ? '...' : '');
                }
                
                channelInfo.appendChild(channelName);
                channelInfo.appendChild(channelUrl);
                
                channelElement.appendChild(channelIcon);
                channelElement.appendChild(channelInfo);
                
                channelElement.onclick = () => playChannel(channel);
                channelScroll.appendChild(channelElement);
            });
            
            if (filteredChannels.length === 0 && allChannels.length > 0) {
                channelScroll.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">未找到匹配的频道</div>';
            }
        }

        function playChannel(channel) {
            if (!channel) return;
            
            currentChannel = channel;
            loadingIndicator.style.display = 'block';
            playerTitle.textContent = channel.tvgInfo.name || channel.title;
            try {
                const url = new URL(channel.url);
                playerSubtitle.textContent = url.hostname;
            } catch (e) {
                playerSubtitle.textContent = channel.url;
            }
            
            player.src({ type: 'application/x-mpegURL', src: channel.url });
            player.play().catch(e => console.error('播放命令失败:', e));
            
            renderChannelList();
            
            const activeElement = channelScroll.querySelector('.active');
            if (activeElement) {
                activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
        
        function playNext() {
            if (!currentChannel || filteredChannels.length === 0) return;
            const currentIndex = filteredChannels.findIndex(c => c.url === currentChannel.url);
            const nextIndex = (currentIndex + 1) % filteredChannels.length;
            playChannel(filteredChannels[nextIndex]);
        }

        function playPrev() {
            if (!currentChannel || filteredChannels.length === 0) return;
            const currentIndex = filteredChannels.findIndex(c => c.url === currentChannel.url);
            const prevIndex = (currentIndex - 1 + filteredChannels.length) % filteredChannels.length;
            playChannel(filteredChannels[prevIndex]);
        }

        async function initialize() {
            try {
                const response = await fetch(playlistUrl);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.text();
                
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const tvgInfo = extractTvgInfo(lines[i]);
                        const title = lines[i].split(',')[1] || '未命名频道';
                        const url = parseM3ULine(lines[i+1]);
                        if (url && isValidIpv4Url(url)) {
                            allChannels.push({ title: title.trim(), url: url.trim(), tvgInfo });
                        }
                    }
                }
                
                renderChannelList();
                if (allChannels.length > 0) {
                    playChannel(allChannels[0]);
                    statusMessage.textContent = `已加载 ${allChannels.length} 个电视频道`;
                } else {
                    statusMessage.textContent = '未找到可用电视频道';
                    channelScroll.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">播放列表为空或格式错误</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                statusMessage.textContent = '频道列表加载失败';
                statusBar.classList.add('error');
                channelScroll.innerHTML = `<div style="text-align: center; padding: 30px; color: var(--error-color);">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 15px;"></i>
                    <p>频道列表加载失败</p>
                    <p style="font-size: 0.9rem; margin-top: 10px;">${error.message || '请检查网络连接'}</p>
                </div>`;
            }
        }

        player.on('playing', () => {
            loadingIndicator.style.display = 'none';
            statusBar.classList.remove('error');
            statusMessage.textContent = `正在播放: ${playerTitle.textContent}`;
        });
        
        player.on('error', () => {
            loadingIndicator.style.display = 'none';
            statusBar.classList.add('error');
            statusMessage.textContent = `播放错误: ${playerTitle.textContent}`;
            // ** CRITICAL FIX: NO MORE AUTO-RETRY **
        });
        
        player.on('waiting', () => {
            loadingIndicator.style.display = 'block';
            statusBar.classList.remove('error');
            statusMessage.textContent = '正在加载...';
        });
        
        prevBtn.onclick = playPrev;
        nextBtn.onclick = playNext;
        
        document.addEventListener('keydown', e => {
            if (document.activeElement === searchInput) return;
            if (e.key === 'ArrowUp') { e.preventDefault(); playPrev(); }
            if (e.key === 'ArrowDown') { e.preventDefault(); playNext(); }
        });
        
        let touchStartX = 0;
        player.el().addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
        player.el().addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].clientX;
            if (touchEndX < touchStartX - 50) playNext();
            if (touchEndX > touchStartX + 50) playPrev();
        }, { passive: true });
        
        searchInput.addEventListener('input', renderChannelList);

        initialize();
    </script>
</body>
</html>
