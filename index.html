<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free IPTV - Smart Status List</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.min.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #16181d;
            --bg-glass: rgba(28, 30, 37, 0.5);
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-primary: #00e5ff;
            --accent-secondary: #ff00e5;
            --status-ok: #28a745;
            --status-bad: #dc3545;
            --status-unknown: #6c757d;
            --border-glow: linear-gradient(145deg, var(--accent-primary), var(--accent-secondary));
            --shadow-color: rgba(0, 0, 0, 0.3);
            --radius-l: 24px;
            --radius-m: 16px;
            --radius-s: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at 10% 20%, rgba(0, 229, 255, 0.1), transparent 30%),
                        radial-gradient(circle at 90% 80%, rgba(255, 0, 229, 0.1), transparent 30%),
                        radial-gradient(circle at 50% 50%, rgba(60, 0, 255, 0.05), transparent 40%);
            animation: aurora 20s infinite linear;
        }

        @keyframes aurora {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container { max-width: 1500px; margin: 0 auto; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        header { text-align: center; padding: 20px 0; flex-shrink: 0; }
        h1 { font-size: 2.5em; font-weight: 700; color: #fff; letter-spacing: 1px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.1); }
        .content { display: flex; gap: 25px; flex-grow: 1; height: calc(100% - 100px); }

        #channel-list, #player-container {
            background-color: var(--bg-glass);
            backdrop-filter: blur(30px) saturate(120%);
            -webkit-backdrop-filter: blur(30px) saturate(120%);
            border-radius: var(--radius-l);
            box-shadow: 0 8px 40px var(--shadow-color);
            position: relative;
            overflow: hidden;
        }
        
        #channel-list::after, #player-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: var(--radius-l);
            border: 1px solid transparent;
            background: var(--border-glow) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            pointer-events: none;
        }

        #channel-list {
            flex: 0 0 340px;
            height: 100%;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .channel-list-inner {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 10px;
            margin-right: -10px;
        }
        .channel-list-inner::-webkit-scrollbar { width: 6px; }
        .channel-list-inner::-webkit-scrollbar-track { background: transparent; }
        .channel-list-inner::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        #channel-list button {
            display: flex; align-items: center; width: 100%;
            padding: 12px 15px; border: none; background-color: transparent;
            cursor: pointer; transition: background-color 0.2s ease-out;
            border-radius: var(--radius-m); margin-bottom: 8px;
            position: relative; overflow: hidden;
        }
        #channel-list button:hover { background-color: rgba(255, 255, 255, 0.05); }
        #channel-list button.active { background-color: rgba(255, 255, 255, 0.08); }
        #channel-list button.active::before {
            content: ''; position: absolute; left: 0; top: 15%; bottom: 15%;
            width: 4px; border-radius: 0 4px 4px 0;
            background-image: var(--border-glow);
            box-shadow: 0 0 8px var(--accent-primary), 0 0 12px var(--accent-secondary);
        }
        #channel-list button.active .channel-name { color: #fff; }

        .channel-item { display: flex; align-items: center; width: 100%; overflow: hidden; }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-right: 15px;
            transition: background-color 0.3s ease;
        }
        .status-unknown { background-color: var(--status-unknown); }
        .status-ok { background-color: var(--status-ok); box-shadow: 0 0 5px var(--status-ok); }
        .status-bad { background-color: var(--status-bad); }

        .channel-icon { width: 40px; height: 40px; margin-right: 15px; object-fit: contain; border-radius: var(--radius-s); background-color: rgba(255, 255, 255, 0.1); padding: 4px; flex-shrink: 0; }
        .channel-info { overflow: hidden; flex-grow: 1; }
        .channel-name { font-weight: 500; font-size: 1em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); transition: color 0.2s ease; }
        .channel-description { font-size: 0.85em; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #player-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        #video-wrapper { width: 100%; position: relative; padding-top: 56.25%; background-color: #000; border-radius: var(--radius-m); overflow: hidden; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); }
        .video-js { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        @media (max-width: 968px) {
            body { overflow: auto; }
            .container { height: auto; }
            .content { flex-direction: column; height: auto; }
            #channel-list { height: 40vh; order: 2; }
            #player-container { order: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Free IPTV</h1>
        </header>
        <div class="content">
            <div id="channel-list">
                <div class="channel-list-inner"></div>
            </div>
            <div id="player-container">
                <div id="video-wrapper">
                    <video-js id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{"techOrder": ["html5"]}'>
                        <p class="vjs-no-js">To view this video please enable JavaScript.</p>
                    </video-js>
                </div>
            </div>
        </div>
    </div>

    <script>
        const playlistUrl = 'https://raw.githubusercontent.com/sdlkhfksl/tvn/refs/heads/main/tv.m3u';
        const channelListContainer = document.querySelector('.channel-list-inner');
        const player = videojs('my-video', {
            html5: { hls: { overrideNative: true } }
        });

        let currentChannelIndex = -1;
        let channels = [];
        let channelStatuses = {};
        const STATUS_KEY = 'iptv_channel_statuses';

        // --- Helper Functions ---
        function isValidIpv4Url(string) {
            try {
                const url = new URL(string);
                return !string.includes('[') && !string.includes(']');
            } catch (_) { return false; }
        }

        function parseM3ULine(line) {
            return (line.startsWith('http://') || line.startsWith('https://')) ? line.trim() : null;
        }

        function extractTvgInfo(extinf) {
            const logoMatch = extinf.match(/tvg-logo="([^"]+)"/);
            const nameMatch = extinf.match(/tvg-name="([^"]+)"/);
            return { logo: logoMatch?.[1] || null, name: nameMatch?.[1] || null };
        }

        function loadStatuses() {
            try {
                const stored = localStorage.getItem(STATUS_KEY);
                channelStatuses = stored ? JSON.parse(stored) : {};
            } catch (e) {
                console.error("Could not load statuses from localStorage", e);
                channelStatuses = {};
            }
        }

        function saveStatuses() {
            try {
                localStorage.setItem(STATUS_KEY, JSON.stringify(channelStatuses));
            } catch (e) {
                console.error("Could not save statuses to localStorage", e);
            }
        }

        function updateChannelStatus(index, status) {
            const channel = channels[index];
            if (!channel) return;

            // Update the status in our object and save it
            channelStatuses[channel.url] = status;
            saveStatuses();

            // Update the UI
            const button = channelListContainer.querySelectorAll('button')[index];
            if (button) {
                const dot = button.querySelector('.status-dot');
                if (dot) {
                    dot.className = `status-dot status-${status}`;
                }
            }
        }

        function renderChannelList() {
            channelListContainer.innerHTML = '';
            channels.forEach((channel, index) => {
                const button = document.createElement('button');
                const channelItem = document.createElement('div');
                channelItem.className = 'channel-item';

                // Status Dot
                const statusDot = document.createElement('div');
                const currentStatus = channelStatuses[channel.url] || 'unknown';
                statusDot.className = `status-dot status-${currentStatus}`;
                channelItem.appendChild(statusDot);

                if (channel.tvgInfo.logo) {
                    const img = document.createElement('img');
                    img.src = channel.tvgInfo.logo;
                    img.className = 'channel-icon';
                    img.alt = channel.tvgInfo.name || channel.title;
                    img.onerror = function() { this.style.display = 'none'; };
                    channelItem.appendChild(img);
                }

                const infoDiv = document.createElement('div');
                infoDiv.className = 'channel-info';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'channel-name';
                nameSpan.textContent = channel.tvgInfo.name || channel.title;
                infoDiv.appendChild(nameSpan);

                if (channel.tvgInfo.name && channel.tvgInfo.name.toLowerCase() !== channel.title.toLowerCase() && channel.title) {
                    const descSpan = document.createElement('span');
                    descSpan.className = 'channel-description';
                    descSpan.textContent = channel.title;
                    infoDiv.appendChild(descSpan);
                }

                channelItem.appendChild(infoDiv);
                button.appendChild(channelItem);
                button.onclick = () => playChannel(index);
                channelListContainer.appendChild(button);
            });
        }

        function playChannel(index) {
            if (index < 0 || index >= channels.length) return;
            
            const channel = channels[index];
            currentChannelIndex = index;

            // Remove previous listeners to avoid multiple triggers
            player.off(['loadeddata', 'error', 'timeupdate']);

            // Set up one-time listeners for this playback attempt
            player.one('loadeddata', () => {
                console.log(`✅ Channel OK: ${channel.title}`);
                updateChannelStatus(index, 'ok');
            });
            
            const errorTimeout = setTimeout(() => {
                console.warn(`❌ Channel Failed (Timeout): ${channel.title}`);
                updateChannelStatus(index, 'bad');
                player.off(['loadeddata', 'error']); // Clean up other listeners
            }, 10000); // 10-second timeout for playback to start

            player.one('error', () => {
                console.warn(`❌ Channel Failed (Player Error): ${channel.title}`);
                clearTimeout(errorTimeout);
                updateChannelStatus(index, 'bad');
            });

            player.src({ type: 'application/x-mpegURL', src: channel.url });
            player.play();

            const currentActive = channelListContainer.querySelector('button.active');
            if (currentActive) currentActive.classList.remove('active');
            
            const buttons = channelListContainer.querySelectorAll('button');
            if (buttons[index]) {
                buttons[index].classList.add('active');
                buttons[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // --- Main Application Flow ---
        async function main() {
            try {
                loadStatuses();
                const response = await fetch(playlistUrl);
                const data = await response.text();
                const lines = data.split('\n');
                
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const tvgInfo = extractTvgInfo(lines[i]);
                        const title = (lines[i].split(',')[1] || '').trim();
                        const url = parseM3ULine(lines[i + 1]);
                        if (url && isValidIpv4Url(url)) {
                            channels.push({ title, url, tvgInfo });
                        }
                    }
                }

                if (channels.length > 0) {
                    renderChannelList();
                    playChannel(0); // Autoplay the first channel
                } else {
                    channelListContainer.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">未找到任何频道。</p>';
                }

            } catch (error) {
                console.error('Failed to initialize:', error);
                channelListContainer.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">加载频道列表失败。</p>';
            }
        }

        main();

        // --- Event Listeners for UI interaction (Unchanged) ---
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                playChannel(Math.max(0, currentChannelIndex - 1));
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
            }
        });

        let touchStartX = 0, touchEndX = 0;
        const playerElement = document.getElementById('player-container');
        playerElement.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        playerElement.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (Math.abs(touchStartX - touchEndX) < 50) return;
            if (touchEndX < touchStartX) playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
            if (touchEndX > touchStartX) playChannel(Math.max(0, currentChannelIndex - 1));
        }, { passive: true });
    </script>
</body>
</html>
