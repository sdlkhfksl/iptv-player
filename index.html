<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free IPTV - Elegant Edition</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.min.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #121212;
            --bg-glass: rgba(28, 28, 30, 0.6);
            --text-primary: #e1e1e1;
            --text-secondary: #a0a0a0;
            --accent-primary: #00aaff;
            --accent-secondary: #aa00ff;
            --border-glow: linear-gradient(145deg, var(--accent-primary), var(--accent-secondary));
            --shadow-color: rgba(0, 0, 0, 0.4);
            --radius-l: 24px;
            --radius-m: 16px;
            --radius-s: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at 15% 25%, rgba(0, 170, 255, 0.1), transparent 40%),
                        radial-gradient(circle at 85% 75%, rgba(170, 0, 255, 0.1), transparent 40%);
            animation: aurora 25s infinite linear alternate;
        }

        @keyframes aurora {
            from { transform: rotate(0deg) scale(1.2); }
            to { transform: rotate(360deg) scale(1.5); }
        }

        .container { max-width: 1600px; margin: 0 auto; padding: 25px; height: 100vh; display: flex; flex-direction: column; }
        header { text-align: center; padding: 20px 0; flex-shrink: 0; }
        h1 { font-size: 2.8em; font-weight: 700; color: #fff; letter-spacing: -1px; text-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }
        .content { display: flex; gap: 30px; flex-grow: 1; height: calc(100% - 110px); }

        #channel-list, #player-container {
            background-color: var(--bg-glass);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border-radius: var(--radius-l);
            box-shadow: 0 12px 50px var(--shadow-color);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #channel-list {
            flex: 0 0 350px;
            height: 100%;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        
        .channel-list-inner {
            overflow-y: auto;
            flex-grow: 1;
            padding: 10px;
        }
        .channel-list-inner::-webkit-scrollbar { width: 6px; }
        .channel-list-inner::-webkit-scrollbar-track { background: transparent; }
        .channel-list-inner::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        #channel-list button {
            display: flex; align-items: center; width: 100%;
            padding: 12px 15px; border: none; background-color: transparent;
            cursor: pointer;
            border-radius: var(--radius-m); margin-bottom: 8px;
            position: relative; overflow: hidden;
            transition: background-color 0.3s ease;
        }

        /* === Hover Glow Effect === */
        #channel-list button::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: var(--radius-m);
            background: radial-gradient(circle at var(--x) var(--y), rgba(255, 255, 255, 0.1), transparent 40%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        #channel-list button:hover::before {
            opacity: 1;
        }

        #channel-list button.active {
            background-color: rgba(0, 170, 255, 0.15);
        }
        #channel-list button.active::after {
            content: '';
            position: absolute;
            left: 0; top: 15%; bottom: 15%;
            width: 4px; border-radius: 0 4px 4px 0;
            background-image: var(--border-glow);
            box-shadow: 0 0 8px var(--accent-primary), 0 0 12px var(--accent-secondary);
        }
        #channel-list button.active .channel-name { color: #fff; font-weight: 500; }

        .channel-item {
            display: grid;
            grid-template-columns: 40px 1fr; /* Fixed width for icon area, rest for text */
            align-items: center;
            gap: 15px;
            width: 100%;
            position: relative; /* For z-index to be above the glow */
            z-index: 2;
        }

        .channel-icon-wrapper {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .channel-icon {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: var(--radius-s);
            background-color: rgba(255, 255, 255, 0.1);
            padding: 4px;
        }

        .channel-info {
            overflow: hidden;
        }
        .channel-name {
            font-weight: 400;
            font-size: 1em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
            transition: color 0.3s ease, font-weight 0.3s ease;
        }

        #player-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        #video-wrapper { width: 100%; position: relative; padding-top: 56.25%; background-color: #000; border-radius: var(--radius-m); overflow: hidden; box-shadow: 0 0 40px rgba(0, 0, 0, 0.6); }
        .video-js { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        @media (max-width: 968px) {
            body { overflow: auto; }
            .container { height: auto; }
            .content { flex-direction: column; height: auto; }
            #channel-list { height: 40vh; order: 2; }
            #player-container { order: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Free IPTV</h1>
        </header>
        <div class="content">
            <div id="channel-list">
                <div class="channel-list-inner"></div>
            </div>
            <div id="player-container">
                <div id="video-wrapper">
                    <video-js id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{"techOrder": ["html5"]}'>
                        <p class="vjs-no-js">To view this video please enable JavaScript.</p>
                    </video-js>
                </div>
            </div>
        </div>
    </div>

    <script>
        const playlistUrl = 'https://raw.githubusercontent.com/sdlkhfksl/tvn/refs/heads/main/tv.m3u';
        const channelListContainer = document.querySelector('.channel-list-inner');
        const player = videojs('my-video', {
            html5: { hls: { overrideNative: true } }
        });

        let currentChannelIndex = -1;
        let channels = [];

        // --- Helper Functions ---
        function isValidIpv4Url(string) {
            try {
                const url = new URL(string);
                return !string.includes('[') && !string.includes(']');
            } catch (_) { return false; }
        }

        function parseM3ULine(line) {
            return (line.startsWith('http://') || line.startsWith('https://')) ? line.trim() : null;
        }

        function extractTvgInfo(extinf) {
            const logoMatch = extinf.match(/tvg-logo="([^"]+)"/);
            const nameMatch = extinf.match(/tvg-name="([^"]+)"/);
            return { logo: logoMatch?.[1] || null, name: nameMatch?.[1] || null };
        }

        function renderChannelList() {
            channelListContainer.innerHTML = '';
            channels.forEach((channel, index) => {
                const button = document.createElement('button');
                button.title = channel.title; // Show original title on hover
                
                const channelItem = document.createElement('div');
                channelItem.className = 'channel-item';

                // Icon Wrapper - ensures alignment
                const iconWrapper = document.createElement('div');
                iconWrapper.className = 'channel-icon-wrapper';

                if (channel.tvgInfo.logo) {
                    const img = document.createElement('img');
                    img.src = channel.tvgInfo.logo;
                    img.className = 'channel-icon';
                    img.alt = '';
                    img.onerror = function() { 
                        // If logo fails, remove the img element to keep the space empty
                        this.remove();
                    };
                    iconWrapper.appendChild(img);
                }
                channelItem.appendChild(iconWrapper);

                // Info (Name)
                const infoDiv = document.createElement('div');
                infoDiv.className = 'channel-info';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'channel-name';
                nameSpan.textContent = channel.tvgInfo.name || channel.title;
                infoDiv.appendChild(nameSpan);
                channelItem.appendChild(infoDiv);

                button.appendChild(channelItem);
                button.onclick = () => playChannel(index);
                channelListContainer.appendChild(button);
            });
        }

        function playChannel(index) {
            if (index < 0 || index >= channels.length) return;
            
            const channel = channels[index];
            player.src({ type: 'application/x-mpegURL', src: channel.url });
            player.play();

            const currentActive = channelListContainer.querySelector('button.active');
            if (currentActive) currentActive.classList.remove('active');
            
            const buttons = channelListContainer.querySelectorAll('button');
            if (buttons[index]) {
                buttons[index].classList.add('active');
                if (currentChannelIndex === -1) { // Only scroll on first play
                    buttons[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
            currentChannelIndex = index;
        }

        // --- Main Application Flow ---
        async function main() {
            try {
                const response = await fetch(playlistUrl);
                const data = await response.text();
                const lines = data.split('\n');
                
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const tvgInfo = extractTvgInfo(lines[i]);
                        const title = (lines[i].split(',')[1] || '').trim();
                        const url = parseM3ULine(lines[i + 1]);
                        if (url && isValidIpv4Url(url)) {
                            channels.push({ title, url, tvgInfo });
                        }
                    }
                }

                if (channels.length > 0) {
                    renderChannelList();
                    playChannel(0); // Autoplay the first channel
                } else {
                    channelListContainer.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">未找到任何频道。</p>';
                }

            } catch (error) {
                console.error('Failed to initialize:', error);
                channelListContainer.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">加载频道列表失败。</p>';
            }
        }

        main();

        // --- Event Listeners for UI interaction ---
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                playChannel(Math.max(0, currentChannelIndex - 1));
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
            }
        });

        let touchStartX = 0, touchEndX = 0;
        const playerElement = document.getElementById('player-container');
        playerElement.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        playerElement.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (Math.abs(touchStartX - touchEndX) < 50) return;
            if (touchEndX < touchStartX) playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
            if (touchEndX > touchStartX) playChannel(Math.max(0, currentChannelIndex - 1));
        }, { passive: true });

        // Mouse move listener for the hover glow effect
        channelListContainer.addEventListener('mousemove', e => {
            const button = e.target.closest('button');
            if (button) {
                const rect = button.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                button.style.setProperty('--x', `${x}px`);
                button.style.setProperty('--y', `${y}px`);
            }
        });
    </script>
</body>
</html>
