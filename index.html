<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free IPTV</title>
  <!-- Video.js 样式 -->
  <link href="https://vjs.zencdn.net/7.20.3/video-js.min.css" rel="stylesheet" />
  <!-- 字体 -->
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: rgba(255, 255, 255, 0.6);
      --secondary: rgba(255, 255, 255, 0.3);
      --accent: #007aff;
      --text: #1c1c1e;
      --bg: #f2f2f7;
      --glass-blur: 20px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'SF Pro Display', sans-serif;
      background: linear-gradient(135deg, #e0e0e4, #f9f9fb);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      max-width: 1400px;
      margin: auto;
      padding: 20px;
    }
    header {
      text-align: center;
      padding: 30px 0;
      backdrop-filter: blur(var(--glass-blur));
      background: var(--primary);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }
    header h1 {
      font-size: 3rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 1px;
    }
    .content {
      display: flex;
      gap: 20px;
      backdrop-filter: blur(var(--glass-blur));
      background: var(--secondary);
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    #channel-list {
      flex: 0 0 300px;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
      padding: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;
    }
    #channel-list::-webkit-scrollbar {
      width: 6px;
    }
    #channel-list::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 3px;
    }
    #channel-list button {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 12px;
      margin-bottom: 12px;
      transition: transform 0.2s ease, background 0.2s ease;
      cursor: pointer;
    }
    #channel-list button.active,
    #channel-list button:hover {
      background: rgba(255,255,255,0.4);
      transform: translateX(5px);
    }
    .channel-icon {
      width: 40px;
      height: 40px;
      margin-right: 12px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .channel-info {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .channel-name {
      font-weight: 600;
      font-size: 1rem;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }
    .channel-description {
      font-size: 0.85rem;
      opacity: 0.8;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }
    #player-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    #video-wrapper {
      width: 100%;
      max-width: 1080px;
      position: relative;
      padding-top: 56.25%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
    .video-js {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }
    #controls button {
      padding: 10px 20px;
      font-size: 1rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    #controls button:hover {
      background: rgba(0,122,255,0.8);
    }
    @media (max-width: 968px) {
      .content { flex-direction: column; }
      #channel-list { max-height: 250px; }
      #controls { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Free IPTV</h1>
  </header>
  <div class="container">
    <div class="content">
      <div id="channel-list"></div>
      <div id="player-container">
        <div id="video-wrapper">
          <video-js
            id="my-video"
            class="video-js vjs-big-play-centered"
            controls preload="auto"
            data-setup='{"techOrder": ["html5"]}'>
            <p class="vjs-no-js">
              To view this video please enable JavaScript, and consider upgrading to a web browser that
              <a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 video</a>
            </p>
          </video-js>
        </div>
      </div>
    </div>
    <div id="controls">
      <button id="prev-channel">上一个频道</button>
      <button id="next-channel">下一个频道</button>
    </div>
  </div>
  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
  <script>
    (function() {
      const playlistUrl = 'https://raw.githubusercontent.com/sdlkhfksl/tvn/refs/heads/main/tv.m3u';
      const channelList = document.getElementById('channel-list');
      const player = videojs('my-video', { html5: { hls: { overrideNative: true } } });
      let currentIndex = -1;
      const channels = [];
      function play(idx) {
        if (idx < 0 || idx >= channels.length) return;
        const ch = channels[idx];
        player.src({ src: ch.url, type: 'application/x-mpegURL' });
        player.play();
        Array.from(channelList.children).forEach(btn => btn.classList.remove('active'));
        channelList.children[idx].classList.add('active');
        channelList.children[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        currentIndex = idx;
      }
      fetch(playlistUrl).then(r => r.text()).then(txt => {
        const lines = txt.split('\n');
        for (let i = 0; i < lines.length; i++) {
          if (lines[i].startsWith('#EXTINF')) {
            const title = lines[i].split(',')[1] || 'Unknown';
            const url = lines[i+1].trim();
            if (/^https?:\/\//.test(url)) {
              channels.push({ title, url });
              const btn = document.createElement('button');
              btn.innerHTML = `<span class="channel-name">${title}</span>`;
              channelList.appendChild(btn);
              btn.onclick = () => play(channels.length-1);
            }
          }
        }
        if (channels.length) play(0);
      }).catch(console.error);
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp') play(Math.max(0, currentIndex-1));
        if (e.key === 'ArrowDown') play(Math.min(channels.length-1, currentIndex+1));
        if (e.key === 'Enter') play(currentIndex);
      });
      document.getElementById('prev-channel').onclick = () => play(Math.max(0, currentIndex-1));
      document.getElementById('next-channel').onclick = () => play(Math.min(channels.length-1, currentIndex+1));
    })();
  </script>
</body>
</html>
