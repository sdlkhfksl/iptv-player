<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free IPTV - Elegant & Stable Edition</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.min.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #121212;
            --bg-glass: rgba(28, 28, 30, 0.6);
            --text-primary: #e1e1e1;
            --text-secondary: #a0a0a0;
            --accent-primary: #00aaff;
            --accent-secondary: #aa00ff;
            --border-glow: linear-gradient(145deg, var(--accent-primary), var(--accent-secondary));
            --shadow-color: rgba(0, 0, 0, 0.4);
            --radius-l: 24px;
            --radius-m: 16px;
            --radius-s: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at 15% 25%, rgba(0, 170, 255, 0.1), transparent 40%),
                        radial-gradient(circle at 85% 75%, rgba(170, 0, 255, 0.1), transparent 40%);
            animation: aurora 25s infinite linear alternate;
        }

        @keyframes aurora {
            from { transform: rotate(0deg) scale(1.2); }
            to { transform: rotate(360deg) scale(1.5); }
        }

        .container { max-width: 1600px; margin: 0 auto; padding: 25px; height: 100vh; display: flex; flex-direction: column; }
        header { text-align: center; padding: 20px 0; flex-shrink: 0; }
        h1 { font-size: 2.8em; font-weight: 700; color: #fff; letter-spacing: -1px; text-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }
        .content { display: flex; gap: 30px; flex-grow: 1; height: calc(100% - 110px); }

        #channel-list-wrapper, #player-container {
            background-color: var(--bg-glass);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border-radius: var(--radius-l);
            box-shadow: 0 12px 50px var(--shadow-color);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #channel-list-wrapper {
            flex: 0 0 350px;
            height: 100%;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        
        #channel-list {
            overflow-y: auto;
            flex-grow: 1;
            padding: 10px;
        }
        #channel-list::-webkit-scrollbar { width: 6px; }
        #channel-list::-webkit-scrollbar-track { background: transparent; }
        #channel-list::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        #channel-list button {
            display: flex; align-items: center; width: 100%;
            padding: 12px 15px; border: none; background-color: transparent;
            cursor: pointer;
            border-radius: var(--radius-m); margin-bottom: 8px;
            position: relative; overflow: hidden;
            transition: background-color 0.3s ease;
        }

        #channel-list button::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: var(--radius-m);
            background: radial-gradient(circle at var(--x) var(--y), rgba(255, 255, 255, 0.1), transparent 40%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        #channel-list button:hover::before {
            opacity: 1;
        }

        #channel-list button.active {
            background-color: rgba(0, 170, 255, 0.15);
        }
        #channel-list button.active::after {
            content: '';
            position: absolute;
            left: 0; top: 15%; bottom: 15%;
            width: 4px; border-radius: 0 4px 4px 0;
            background-image: var(--border-glow);
            box-shadow: 0 0 8px var(--accent-primary), 0 0 12px var(--accent-secondary);
        }
        #channel-list button.active .channel-name { color: #fff; font-weight: 500; }

        .channel-item {
            display: grid;
            grid-template-columns: 40px 1fr;
            align-items: center;
            gap: 15px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .channel-icon-wrapper {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .channel-icon {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: var(--radius-s);
            background-color: rgba(255, 255, 255, 0.1);
            padding: 4px;
        }

        .channel-info {
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .channel-name {
            font-weight: 400;
            font-size: 1em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
            transition: color 0.3s ease, font-weight 0.3s ease;
        }
        .channel-description {
            font-size: 0.8em;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
        }

        #player-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        #video-wrapper { width: 100%; position: relative; padding-top: 56.25%; background-color: #000; border-radius: var(--radius-m); overflow: hidden; box-shadow: 0 0 40px rgba(0, 0, 0, 0.6); }
        .video-js { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        @media (max-width: 968px) {
            body { overflow: auto; }
            .container { height: auto; }
            .content { flex-direction: column; height: auto; }
            #channel-list-wrapper { height: 40vh; order: 2; }
            #player-container { order: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Free IPTV</h1>
        </header>
        <div class="content">
            <div id="channel-list-wrapper">
                <div id="channel-list"></div>
            </div>
            <div id="player-container">
                <div id="video-wrapper">
                    <video-js id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{"techOrder": ["html5"]}'>
                        <p class="vjs-no-js">To view this video please enable JavaScript.</p>
                    </video-js>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === THIS SCRIPT BLOCK IS BASED ON YOUR ORIGINAL, PROVEN-WORKING CODE ===
        const playlistUrl = 'https://raw.githubusercontent.com/sdlkhfksl/tvn/refs/heads/main/tv.m3u';
        const channelList = document.getElementById('channel-list');
        const player = videojs('my-video', {
            html5: {
                hls: {
                    overrideNative: true
                }
            }
        });

        let currentChannelIndex = -1;
        let channels = [];

        function isValidIpv4Url(string) {
            try {
                const url = new URL(string);
                return !string.includes('[') && !string.includes(']');
            } catch (_) {
                return false;
            }
        }

        function parseM3ULine(line) {
            if (line.startsWith('http://') || line.startsWith('https://')) {
                return line.trim();
            }
            return null;
        }

        function extractTvgInfo(extinf) {
            const logoMatch = extinf.match(/tvg-logo="([^"]+)"/);
            const nameMatch = extinf.match(/tvg-name="([^"]+)"/);
            return {
                logo: logoMatch ? logoMatch[1] : null,
                name: nameMatch ? nameMatch[1] : null
            };
        }

        function playChannel(index) {
            if (index >= 0 && index < channels.length) {
                const channel = channels[index];
                player.src({
                    type: 'application/x-mpegURL',
                    src: channel.url
                });
                player.play();
                
                const currentActive = channelList.querySelector('button.active');
                if (currentActive) currentActive.classList.remove('active');
                
                const newActiveButton = channelList.children[index];
                newActiveButton.classList.add('active');
                
                // Scroll into view only if it's not already visible
                const listRect = channelList.getBoundingClientRect();
                const buttonRect = newActiveButton.getBoundingClientRect();
                if (buttonRect.top < listRect.top || buttonRect.bottom > listRect.bottom) {
                    newActiveButton.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                currentChannelIndex = index;
            }
        }

        fetch(playlistUrl)
            .then(response => response.text())
            .then(data => {
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const tvgInfo = extractTvgInfo(lines[i]);
                        // Using your original, robust title parsing
                        const title = lines[i].split(',')[1]; 
                        const url = parseM3ULine(lines[i+1]);

                        if (url && isValidIpv4Url(url)) {
                            channels.push({ title, url, tvgInfo });
                            const button = document.createElement('button');
                            
                            const channelItem = document.createElement('div');
                            channelItem.className = 'channel-item';

                            const iconWrapper = document.createElement('div');
                            iconWrapper.className = 'channel-icon-wrapper';
                            if (tvgInfo.logo) {
                                const img = document.createElement('img');
                                img.src = tvgInfo.logo;
                                img.className = 'channel-icon';
                                img.alt = '';
                                img.onerror = function() { this.remove(); };
                                iconWrapper.appendChild(img);
                            }
                            channelItem.appendChild(iconWrapper);

                            const infoDiv = document.createElement('div');
                            infoDiv.className = 'channel-info';

                            const nameSpan = document.createElement('span');
                            nameSpan.className = 'channel-name';
                            nameSpan.textContent = tvgInfo.name || title;
                            infoDiv.appendChild(nameSpan);

                            // Show description only if it's different and meaningful
                            if (tvgInfo.name && title && tvgInfo.name.trim() !== title.trim()) {
                                const descSpan = document.createElement('span');
                                descSpan.className = 'channel-description';
                                descSpan.textContent = title;
                                infoDiv.appendChild(descSpan);
                            }

                            channelItem.appendChild(infoDiv);
                            button.appendChild(channelItem);
                            channelList.appendChild(button);
                        }
                    }
                }
                if (channels.length > 0) {
                    playChannel(0);
                }
                
                // Use Array.from for better compatibility
                Array.from(channelList.children).forEach((button, index) => {
                    button.onclick = function() {
                        playChannel(index);
                    };
                });
            })
            .catch(error => {
                console.error('Error:', error);
                channelList.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">加载频道列表失败。</p>';
            });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                playChannel(Math.max(0, currentChannelIndex - 1));
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
            }
        });

        // Touch swipe logic from your original code
        let touchStartX = 0;
        let touchEndX = 0;
        const playerContainer = document.getElementById('player-container');

        playerContainer.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        playerContainer.addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            if (Math.abs(touchStartX - touchEndX) < 50) return; // Threshold
            if (touchEndX < touchStartX) {
                playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
            }
            if (touchEndX > touchStartX) {
                playChannel(Math.max(0, currentChannelIndex - 1));
            }
        }

        // Mouse move listener for the hover glow effect
        channelList.addEventListener('mousemove', e => {
            const button = e.target.closest('button');
            if (button) {
                const rect = button.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                button.style.setProperty('--x', `${x}px`);
                button.style.setProperty('--y', `${y}px`);
            }
        });
    </script>
</body>
</html>
