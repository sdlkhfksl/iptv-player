<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <link href="https://vjs.zencdn.net/7.11.4/video-js.css" rel="stylesheet" />
    <style>
        #channel-list {
            display: flex;
            flex-direction: column;
            max-height: 300px;
            overflow-y: auto;
            width: 300px;
        }
        .channel-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        .channel-icon {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        .channel-info {
            display: flex;
            flex-direction: column;
        }
        .channel-name {
            font-weight: bold;
        }
        .channel-description {
            font-size: 0.9em;
            color: gray;
        }
        .active {
            background-color: #ccc;
        }
    </style>
</head>
<body>
    <div>
        <video id="my-video" class="video-js vjs-default-skin" controls preload="auto" width="640" height="264" data-setup="{}">
            <source src="" type="application/x-mpegURL">
        </video>
    </div>

    <div id="channel-list"></div>

    <button id="prev-channel">Previous Channel</button>
    <button id="next-channel">Next Channel</button>

    <script src="https://vjs.zencdn.net/7.11.4/video.js"></script>
    <script>
        const playlistUrl = 'https://raw.githubusercontent.com/sdlkhfksl/tvn/main/tv.m3u';
        const channelList = document.getElementById('channel-list');
        const player = videojs('my-video', {
            html5: {
                hls: {
                    overrideNative: true
                }
            }
        });

        let currentChannelIndex = -1;
        let channels = [];

        // 添加日志记录功能
        function logInfo(message) {
            console.log(`[INFO] ${new Date().toISOString()}: ${message}`);
        }

        function logError(message) {
            console.error(`[ERROR] ${new Date().toISOString()}: ${message}`);
        }

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (error) {
                logError(`Invalid URL: ${string}`);
                return false;
            }
        }

        function parseM3ULine(line) {
            if (line.startsWith('http://') || line.startsWith('https://')) {
                return line.trim();
            }
            return null;
        }

        function extractTvgInfo(extinf) {
            const logoMatch = extinf.match(/tvg-logo="([^"]+)"/);
            const nameMatch = extinf.match(/tvg-name="([^"]+)"/);
            return {
                logo: logoMatch ? logoMatch[1] : null,
                name: nameMatch ? nameMatch[1] : null
            };
        }

        function playChannel(index) {
            if (index >= 0 && index < channels.length) {
                const channel = channels[index];
                logInfo(`Playing channel: ${channel.title} (${channel.url})`);
                
                player.src({
                    type: 'application/x-mpegURL',
                    src: channel.url
                });

                // 捕获播放错误事件
                player.on('error', function () {
                    const error = player.error();
                    logError(`Playback error: Code ${error.code}, Message: ${error.message}`);
                });

                player.play().catch(error => {
                    logError(`Failed to play channel: ${channel.title}. Error: ${error.message}`);
                });

                channelList.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
                channelList.children[index].classList.add('active');
                currentChannelIndex = index;
                channelList.children[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                logError(`Invalid channel index: ${index}`);
            }
        }

        fetch(playlistUrl)
            .then(response => response.text())
            .then(data => {
                logInfo("Fetched playlist successfully.");
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const tvgInfo = extractTvgInfo(lines[i]);
                        const title = lines[i].split(',')[1];
                        const url = parseM3ULine(lines[i+1]);

                        if (url && isValidUrl(url)) {
                            channels.push({ title, url, tvgInfo });
                            const button = document.createElement('button');
                            const channelItem = document.createElement('div');
                            channelItem.className = 'channel-item';

                            if (tvgInfo.logo) {
                                const img = document.createElement('img');
                                img.src = tvgInfo.logo;
                                img.className = 'channel-icon';
                                img.onerror = function() { this.style.display = 'none'; };
                                channelItem.appendChild(img);
                            }

                            const infoDiv = document.createElement('div');
                            infoDiv.className = 'channel-info';

                            const nameSpan = document.createElement('span');
                            nameSpan.className = 'channel-name';
                            nameSpan.textContent = tvgInfo.name || title;
                            infoDiv.appendChild(nameSpan);

                            if (tvgInfo.name && tvgInfo.name !== title) {
                                const descSpan = document.createElement('span');
                                descSpan.className = 'channel-description';
                                descSpan.textContent = title;
                                infoDiv.appendChild(descSpan);
                            }

                            channelItem.appendChild(infoDiv);
                            button.appendChild(channelItem);
                            channelList.appendChild(button);
                        } else {
                            logError(`Invalid channel URL at line ${i + 1}: ${lines[i + 1]}`);
                        }
                    }
                }
                if (channels.length > 0) {
                    playChannel(0);
                } else {
                    logError("No valid channels found in the playlist.");
                }

                // 修复鼠标点击bug
                channelList.querySelectorAll('button').forEach((button, index) => {
                    button.onclick = function() {
                        playChannel(index);
                    };
                });
            })
            .catch(error => logError(`Failed to fetch playlist: ${error.message}`));

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp') {
                playChannel(Math.max(0, currentChannelIndex - 1));
            } else if (e.key === 'ArrowDown') {
                playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
            } else if (e.key === 'Enter') {
                playChannel(currentChannelIndex);
            }
        });

        document.getElementById('prev-channel').addEventListener('click', function() {
            playChannel(Math.max(0, currentChannelIndex - 1));
        });

        document.getElementById('next-channel').addEventListener('click', function() {
            playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
        });

        // 添加触摸屏滑动切换频道功能
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        }, false);

        document.addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            if (touchEndX < touchStartX) {
                playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
            }
            if (touchEndX > touchStartX) {
                playChannel(Math.max(0, currentChannelIndex - 1));
            }
        }
    </script>
</body>
</html>
