<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free IPTV - Exquisite Dark Mode</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.min.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #16181d;
            --bg-glass: rgba(28, 30, 37, 0.5);
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-primary: #00e5ff;
            --accent-secondary: #ff00e5;
            --border-glow: linear-gradient(145deg, var(--accent-primary), var(--accent-secondary));
            --shadow-color: rgba(0, 0, 0, 0.3);
            --radius-l: 24px;
            --radius-m: 16px;
            --radius-s: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden; /* Prevent body scrollbars from the animated background */
        }

        /* === Animated Aurora Background === */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at 10% 20%, rgba(0, 229, 255, 0.1), transparent 30%),
                        radial-gradient(circle at 90% 80%, rgba(255, 0, 229, 0.1), transparent 30%),
                        radial-gradient(circle at 50% 50%, rgba(60, 0, 255, 0.05), transparent 40%);
            animation: aurora 20s infinite linear;
        }

        @keyframes aurora {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 20px 0;
            flex-shrink: 0;
        }

        h1 {
            font-size: 2.5em;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .content {
            display: flex;
            gap: 25px;
            flex-grow: 1;
            height: calc(100% - 100px); /* Adjust based on header height */
        }

        /* === Glass Panels with Gradient Border === */
        #channel-list, #player-container {
            background-color: var(--bg-glass);
            backdrop-filter: blur(30px) saturate(120%);
            -webkit-backdrop-filter: blur(30px) saturate(120%);
            border-radius: var(--radius-l);
            box-shadow: 0 8px 40px var(--shadow-color);
            position: relative;
            overflow: hidden; /* Important for border-image */
        }
        
        /* The gradient border effect */
        #channel-list::after, #player-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: var(--radius-l);
            border: 1px solid transparent;
            background: var(--border-glow) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            pointer-events: none;
        }

        #channel-list {
            flex: 0 0 340px;
            height: 100%;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        
        .channel-list-inner {
            overflow-y: auto;
            padding-right: 10px; /* Space for scrollbar */
            margin-right: -10px; /* Hide scrollbar visually */
        }

        .channel-list-inner::-webkit-scrollbar {
            width: 6px;
        }
        .channel-list-inner::-webkit-scrollbar-track {
            background: transparent;
        }
        .channel-list-inner::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        #channel-list button {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 12px 15px;
            border: none;
            background-color: transparent;
            cursor: pointer;
            transition: background-color 0.2s ease-out;
            border-radius: var(--radius-m);
            margin-bottom: 8px;
            position: relative;
            overflow: hidden;
        }

        #channel-list button:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* === Exquisite Active State Indicator === */
        #channel-list button.active {
            background-color: rgba(255, 255, 255, 0.08);
        }

        #channel-list button.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            bottom: 15%;
            width: 4px;
            border-radius: 0 4px 4px 0;
            background-image: var(--border-glow);
            box-shadow: 0 0 8px var(--accent-primary), 0 0 12px var(--accent-secondary);
        }
        
        #channel-list button.active .channel-name {
            color: #fff;
        }

        .channel-item {
            display: flex;
            align-items: center;
            width: 100%;
            overflow: hidden;
        }

        .channel-icon {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            object-fit: contain;
            border-radius: var(--radius-s);
            background-color: rgba(255, 255, 255, 0.1);
            padding: 4px;
            flex-shrink: 0;
        }

        .channel-info {
            overflow: hidden;
            flex-grow: 1;
        }

        .channel-name {
            font-weight: 500;
            font-size: 1em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
            transition: color 0.2s ease;
        }

        .channel-description {
            font-size: 0.85em;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #player-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #video-wrapper {
            width: 100%;
            position: relative;
            padding-top: 56.25%; /* 16:9 */
            background-color: #000;
            border-radius: var(--radius-m);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .video-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #controls { display: none; }
        #keyboard-info { display: none; } /* Hiding these for a cleaner look, can be re-enabled */

        @media (max-width: 968px) {
            body { overflow: auto; }
            .container { height: auto; }
            .content {
                flex-direction: column;
                height: auto;
            }
            #channel-list {
                height: 40vh;
                order: 2;
            }
            #player-container {
                order: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Free IPTV</h1>
        </header>
        <div class="content">
            <div id="channel-list">
                <!-- A wrapper for custom scrollbar -->
                <div class="channel-list-inner"></div>
            </div>
            <div id="player-container">
                <div id="video-wrapper">
                    <video-js id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{"techOrder": ["html5"]}'>
                        <p class="vjs-no-js">
                            To view this video please enable JavaScript, and consider upgrading to a web browser that
                            <a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 video</a>
                        </p>
                    </video-js>
                </div>
            </div>
        </div>
    </div>

    <script>
        // JavaScript has been slightly modified to append to the new inner div
        const playlistUrl = 'https://raw.githubusercontent.com/sdlkhfksl/tvn/refs/heads/main/tv.m3u';
        const channelListContainer = document.querySelector('.channel-list-inner'); // Target the new inner container
        const player = videojs('my-video', {
            html5: {
                hls: {
                    overrideNative: true
                }
            }
        });

        let currentChannelIndex = -1;
        let channels = [];

        function isValidIpv4Url(string) {
            try {
                const url = new URL(string);
                return !string.includes('[') && !string.includes(']');
            } catch (_) {
                return false;
            }
        }

        function parseM3ULine(line) {
            if (line.startsWith('http://') || line.startsWith('https://')) {
                return line.trim();
            }
            return null;
        }

        function extractTvgInfo(extinf) {
            const logoMatch = extinf.match(/tvg-logo="([^"]+)"/);
            const nameMatch = extinf.match(/tvg-name="([^"]+)"/);
            return {
                logo: logoMatch ? logoMatch[1] : null,
                name: nameMatch ? nameMatch[1] : null
            };
        }

        function playChannel(index) {
            if (index >= 0 && index < channels.length) {
                const channel = channels[index];
                player.src({
                    type: 'application/x-mpegURL',
                    src: channel.url
                });
                player.play();
                
                const currentActive = channelListContainer.querySelector('button.active');
                if (currentActive) {
                    currentActive.classList.remove('active');
                }
                
                const newActiveButton = channelListContainer.children[index];
                newActiveButton.classList.add('active');
                currentChannelIndex = index;
                
                newActiveButton.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        fetch(playlistUrl)
            .then(response => response.text())
            .then(data => {
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        const tvgInfo = extractTvgInfo(lines[i]);
                        const title = (lines[i].split(',')[1] || '').trim();
                        const url = parseM3ULine(lines[i+1]);
                        
                        if (url && isValidIpv4Url(url)) {
                            channels.push({ title, url, tvgInfo });
                            
                            const button = document.createElement('button');
                            const channelItem = document.createElement('div');
                            channelItem.className = 'channel-item';

                            if (tvgInfo.logo) {
                                const img = document.createElement('img');
                                img.src = tvgInfo.logo;
                                img.className = 'channel-icon';
                                img.alt = tvgInfo.name || title;
                                img.onerror = function() { this.style.display = 'none'; };
                                channelItem.appendChild(img);
                            }

                            const infoDiv = document.createElement('div');
                            infoDiv.className = 'channel-info';

                            const nameSpan = document.createElement('span');
                            nameSpan.className = 'channel-name';
                            nameSpan.textContent = tvgInfo.name || title;
                            infoDiv.appendChild(nameSpan);

                            if (tvgInfo.name && tvgInfo.name.toLowerCase() !== title.toLowerCase() && title) {
                                const descSpan = document.createElement('span');
                                descSpan.className = 'channel-description';
                                descSpan.textContent = title;
                                infoDiv.appendChild(descSpan);
                            }

                            channelItem.appendChild(infoDiv);
                            button.appendChild(channelItem);
                            channelListContainer.appendChild(button); // Append to the inner container
                        }
                    }
                }
                if (channels.length > 0) {
                    playChannel(0);
                }
                
                Array.from(channelListContainer.children).forEach((button, index) => {
                    button.onclick = function() {
                        playChannel(index);
                    };
                });
            })
            .catch(error => console.error('Error fetching or parsing playlist:', error));

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                playChannel(Math.max(0, currentChannelIndex - 1));
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
            }
        });

        // Touch swipe functionality remains the same
        let touchStartX = 0;
        let touchEndX = 0;
        const playerElement = document.getElementById('player-container');

        playerElement.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        playerElement.addEventListener('touchend', function(e) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            if (Math.abs(touchStartX - touchEndX) < 50) return;

            if (touchEndX < touchStartX) {
                playChannel(Math.min(channels.length - 1, currentChannelIndex + 1));
            }
            if (touchEndX > touchStartX) {
                playChannel(Math.max(0, currentChannelIndex - 1));
            }
        }
    </script>
</body>
</html>
